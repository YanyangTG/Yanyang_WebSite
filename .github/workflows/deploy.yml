name: 构建并部署到 GitHub Pages

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 安装依赖
        run: npm ci
      
      - name: 构建 Vite + React 项目
        run: npm run build
        env:
          NODE_ENV: production
          DEPLOY_TARGET: github-pages
          VERSION: ${{ github.run_number }}
          BUILDER: GitHub Actions
          BUILD_ENV: github-pages
      
      # 验证 dist 目录是否存在
      - name: 验证构建产物
        run: |
          if [ -d "dist" ]; then
            echo "✅ dist 目录存在"
            ls -la dist/
          else
            echo "❌ dist 目录不存在"
            exit 1
          fi
      
      # 上传构建产物到 GitHub Pages
      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'  # 注意：不要加斜杠，使用 'dist' 而不是 'dist/'
      
      # 可选：同时上传到 Actions Artifacts 作为备份
      - name: 备份构建产物到 Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-backup
          path: dist/
          retention-days: 7
  
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
