name: 部署到宝塔 Nginx

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 安装依赖
        run: npm ci
      
      - name: 构建 Vite + React 项目
        run: npm run build
      
      - name: 部署到宝塔网站目录
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "./dist/*"
          target: "/www/wwwroot/www.yanyn.cn/"
          strip_components: 1
          overwrite: true
      
      - name: 设置权限
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # 设置正确的权限（宝塔默认是 www 用户）
            chown -R www:www /www/wwwroot/www.yanyn.cn
            chmod -R 755 /www/wwwroot/www.yanyn.cn
            # 重载 Nginx（可选，宝塔会自动检测）
            /etc/init.d/nginx reload
            echo "✅ 部署完成！网站已更新到 /www/wwwroot/www.yanyn.cn"
