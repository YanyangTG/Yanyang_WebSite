name: 构建上传github并部署到宝塔 Nginx

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 安装依赖
        run: npm ci
      
      - name: 构建 Vite + React 项目
        run: npm run build
      
      # 上传到 GitHub Actions Artifacts
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 90
      
      # 打包构建产物用于部署
      - name: 打包部署文件
        run: |
          tar -czf dist.tar.gz -C dist .
      
      # 上传到宝塔服务器
      - name: 上传到宝塔服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "dist.tar.gz"
          target: "/tmp/"
          overwrite: true
      
      # 解压并设置权限
      - name: 解压并配置网站
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # 解压到网站目录
            tar -xzf /tmp/dist.tar.gz -C /www/wwwroot/www.yanyn.cn
            
            # 删除临时文件
            rm -f /tmp/dist.tar.gz
            
            # 设置正确的权限
            chown -R www:www /www/wwwroot/www.yanyn.cn
            chmod -R 755 /www/wwwroot/www.yanyn.cn
            
            # 重载 Nginx
            /etc/init.d/nginx reload
            
            echo "✅ 部署完成！网站已更新到 /www/wwwroot/www.yanyn.cn"
